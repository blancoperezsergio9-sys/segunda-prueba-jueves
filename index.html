<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecaKids Ultra Pro Max - Plataforma Científica Integral</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Estilos específicos para generar el informe PDF limpio */
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-container { box-shadow: none !important; border: none !important; margin: 0 !important; padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { 500: '#4f46e5', 600: '#4338ca' } } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100 min-h-screen">
    
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- BASES DE DATOS Y GENERADORES ---
        const namesClass1 = ["Hugo T.", "Sofía M.", "Mateo R.", "Leo G.", "Lucas P.", "Martín S.", "Daniel N.", "Alejandro V.", "Manuel B.", "Álvaro J.", "Adrián C.", "Enzo F.", "Mario L.", "Diego H.", "Marcos A.", "Eva D.", "Alba G.", "Emma R.", "Daniela M.", "Noa S.", "Valeria P.", "Claudia K.", "María L.", "Lucía F.", "Martina J.", "Alma N.", "Chloe B.", "Mía V.", "Carmen C.", "Elena G."];
        const namesClass2 = ["Pablo M.", "Sergio T.", "Jorge R.", "Iván L.", "Carlos V.", "Miguel B.", "David A.", "Álex J.", "Bruno F.", "Óliver S.", "Thiago H.", "Fabio C.", "Gonzalo G.", "Izan M.", "Gael N.", "Eric P.", "Julia D.", "Sara R.", "Lara M.", "Inés S.", "Vega V.", "Paula B.", "Irene F.", "Alicia C.", "Clara G.", "Ainara L.", "Olivia H.", "Ainhoa M.", "Nerea J.", "Rocío P."];
        const namesClass3 = ["Javier R.", "Héctor M.", "Rubén G.", "Víctor S.", "Raúl F.", "Isaac L.", "Samuel B.", "Ismael A.", "Francisco T.", "José H.", "Juan C.", "Tomás V.", "Nicolás P.", "Alan M.", "Denis G.", "Alberto J.", "Marta S.", "Ana B.", "Belén R.", "Andrea M.", "Natalia F.", "Celia C.", "Cristina G.", "Laura L.", "Marina H.", "Silvia V.", "Rebeca P.", "Nuria D.", "Ángela M.", "Leire J."];

        const motorProfiles = ["Especialista Locomoción", "Destreza Manipulativa", "Control de Estabilidad", "Perfil Equilibrado", "Desarrollo en Progreso"];
        const learningStyles = ["Reto Individual", "Cooperativo", "Descubrimiento Guiado", "Asignación de Tareas", "Resolución de Problemas"];
        const currentMissions = ["El vuelo del proyectil", "La senda del ninja", "Equilibrio en el abismo", "El circuito de postas", "Lanzamiento con diana"];
        
        const generateClassData = (className, namesArray, stage, baseAge) => {
            return {
                id: className.replace(/\s+/g, '-').toLowerCase(),
                name: className,
                stage: stage,
                baseAge: baseAge,
                athletes: namesArray.map((name, index) => {
                    const seed = index + baseAge;
                    const baseRpe = 2 + (index % 5);
                    return {
                        id: index + 1,
                        name: name,
                        profile: motorProfiles[index % motorProfiles.length],
                        style: learningStyles[(index + 2) % learningStyles.length],
                        mission: currentMissions[index % currentMissions.length],
                        skills: {
                            locomocion: 40 + (seed * 7) % 56,
                            estabilidad: 45 + (seed * 5) % 51,
                            manipulacion: 35 + (seed * 9) % 61
                        },
                        alpha: {
                            peso: Math.round(22 + (baseAge * 2.5) + (index % 7)),
                            altura: Math.round(110 + (baseAge * 5) + (index % 12)),
                            salto: Math.round(100 + (baseAge * 6) + (index * 2) % 45),
                            fuerza: Math.round(8 + (baseAge * 1.2) + (index % 6)),
                            navette: Math.round(2 + (seed % 6)) // Paliers alcanzados
                        },
                        rpe: baseRpe,
                        rpeHistory: [
                            Math.max(1, baseRpe - 2 + (seed % 3)), 
                            Math.max(1, baseRpe - 1 + (seed % 2)), 
                            Math.max(1, baseRpe + (seed % 3)), 
                            baseRpe
                        ],
                        wellness: { sueno: 3 + (index % 3), energia: 3 + (seed % 3) },
                        asistencia: true
                    };
                })
            };
        };

        const initialDataset = [
            generateClassData("Clase A (6-7 años)", namesClass1, "Fase del Descubrimiento", 6),
            generateClassData("Clase B (8-9 años)", namesClass2, "Fase de Consolidación", 8),
            generateClassData("Clase C (10-12 años)", namesClass3, "Fase de Especialización", 10)
        ];

        // --- FUNCIONES MATEMÁTICAS CIENTÍFICAS ---
        const calcularIMC = (peso, alturaCm) => {
            if (!peso || !alturaCm) return 0;
            const alturaM = alturaCm / 100;
            return (peso / (alturaM * alturaM)).toFixed(1);
        };

        const calcularVO2Max = (palier, edad) => {
            // Fórmula de Léger et al. para población escolar
            if (!palier) return 0;
            const V = 8 + (0.5 * palier); // Velocidad en km/h
            const vo2 = 31.025 + (3.238 * V) - (3.248 * edad) + (0.1536 * V * edad);
            return vo2.toFixed(1);
        };

        const calcularMotorGlobal = (skills) => {
            return Math.round(((skills?.locomocion || 0) + (skills?.estabilidad || 0) + (skills?.manipulacion || 0)) / 3);
        };

        // --- COMPONENTES AUXILIARES (GRÁFICOS) ---
        const SkillsRadar = ({ locomocion, estabilidad, manipulacion, isDarkMode }) => {
            const gridColor = isDarkMode ? "#334155" : "#cbd5e1";
            const getPos = (val, angle) => {
                const r = ((val || 0) / 100) * 65;
                const rad = (angle * Math.PI) / 180;
                return { x: 100 + r * Math.cos(rad), y: 100 + r * Math.sin(rad) };
            };
            const p1 = getPos(locomocion, -90), p2 = getPos(estabilidad, 30), p3 = getPos(manipulacion, 150);

            return (
                <div className="relative flex justify-center items-center my-2">
                    <svg width="200" height="200" className="overflow-visible">
                        {[20, 40, 60, 80, 100].map(lvl => {
                            const l1 = getPos(lvl, -90), l2 = getPos(lvl, 30), l3 = getPos(lvl, 150);
                            return <polygon key={lvl} points={`${l1.x},${l1.y} ${l2.x},${l2.y} ${l3.x},${l3.y}`} fill="none" stroke={gridColor} strokeWidth="1" strokeDasharray={lvl === 100 ? "0" : "3 3"} />
                        })}
                        <line x1="100" y1="100" x2={getPos(100, -90).x} y2={getPos(100, -90).y} stroke={gridColor} strokeWidth="1" />
                        <line x1="100" y1="100" x2={getPos(100, 30).x} y2={getPos(100, 30).y} stroke={gridColor} strokeWidth="1" />
                        <line x1="100" y1="100" x2={getPos(100, 150).x} y2={getPos(100, 150).y} stroke={gridColor} strokeWidth="1" />
                        <polygon points={`${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`} fill="rgba(79, 70, 229, 0.3)" stroke="#4f46e5" strokeWidth="2" />
                        <circle cx={p1.x} cy={p1.y} r="4" fill="#4f46e5" /><circle cx={p2.x} cy={p2.y} r="4" fill="#10b981" /><circle cx={p3.x} cy={p3.y} r="4" fill="#f43f5e" />
                    </svg>
                </div>
            );
        };

        const Sparkline = ({ data }) => {
            if (!data || data.length === 0) return null;
            const max = 10, min = 0, width = 60, height = 20;
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((d - min) / (max - min)) * height;
                return `${x},${y}`;
            }).join(" ");
            
            return (
                <svg width={width} height={height} className="overflow-visible stroke-indigo-500 dark:stroke-indigo-400">
                    <polyline points={points} fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                    <circle cx={(data.length - 1) * (width / (data.length - 1))} cy={height - ((data[data.length-1] - min) / (max - min)) * height} r="2" className="fill-indigo-500" />
                </svg>
            );
        };

        // --- VISTAS DE LA APLICACIÓN ---

        const DashboardView = ({ classes, classIdx }) => {
            const currentClass = classes[classIdx];
            let totalMotor = 0, totalRpe = 0, alerts = 0, present = 0;
            
            currentClass.athletes.forEach(a => {
                totalMotor += calcularMotorGlobal(a.skills);
                totalRpe += a.rpe;
                if (a.rpe > 6) alerts++;
                if (a.asistencia) present++;
            });
            
            const avgMotor = Math.round(totalMotor / currentClass.athletes.length);
            const avgRpe = (totalRpe / currentClass.athletes.length).toFixed(1);
            const attendanceRate = Math.round((present / currentClass.athletes.length) * 100);

            return (
                <div className="space-y-6 animate-fade">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Índice Motor Medio</div>
                            <div className="text-2xl font-black mt-1 text-indigo-600 dark:text-indigo-400">{avgMotor} / 100</div>
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Carga Percibida (RPE)</div>
                            <div className="text-2xl font-black mt-1 text-emerald-500">{avgRpe} / 10</div>
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Alertas Fatiga</div>
                            <div className="text-2xl font-black mt-1 text-rose-500">{alerts} Críticas</div>
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Asistencia</div>
                            <div className="text-2xl font-black mt-1 text-amber-500">{attendanceRate}%</div>
                        </div>
                    </div>
                </div>
            );
        };

        const AthleteView = ({ classes, classIdx, athleteId, setClasses, isDarkMode }) => {
            const currentClass = classes[classIdx];
            const athlete = currentClass.athletes.find(a => a.id === athleteId) || currentClass.athletes[0];
            const globalScore = calcularMotorGlobal(athlete.skills);
            const imc = calcularIMC(athlete.alpha.peso, athlete.alpha.altura);
            const vo2max = calcularVO2Max(athlete.alpha.navette, currentClass.baseAge);

            const handlePrint = () => window.print();

            return (
                <div className="animate-fade print-container">
                    {/* Botón de impresión oculto en el PDF final */}
                    <div className="flex justify-end mb-4 no-print">
                        <button onClick={handlePrint} className="bg-slate-800 text-white dark:bg-slate-100 dark:text-slate-900 px-4 py-2 rounded-xl text-xs font-bold shadow hover:scale-105 transition-transform flex items-center gap-2">
                            🖨️ Generar Informe Clínico PDF
                        </button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">
                            <div className="bg-gradient-to-tr from-indigo-950 via-indigo-900 to-slate-900 text-white p-6 rounded-3xl shadow-md flex justify-between items-center print-container">
                                <div>
                                    <span className="bg-white/10 text-xs px-2.5 py-1 rounded-md uppercase tracking-wider font-mono">EXPEDIENTE ID-{athlete.id}</span>
                                    <h2 className="text-2xl font-black mt-2">{athlete.name}</h2>
                                    <p className="text-indigo-200 text-xs mt-1">{currentClass.name} • {currentClass.stage}</p>
                                    <div className="flex flex-wrap gap-2 mt-3 no-print">
                                        <span className="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-[10px] font-bold px-2 py-0.5 rounded-md">{athlete.profile}</span>
                                        <span className="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-[10px] font-bold px-2 py-0.5 rounded-md">Estilo: {athlete.style}</span>
                                    </div>
                                </div>
                                <div className="bg-slate-900/50 p-4 rounded-2xl border border-white/10 text-center min-w-[100px]">
                                    <div className="text-[9px] uppercase tracking-wider text-indigo-300 font-bold">Índice Global</div>
                                    <div className="text-4xl font-black mt-1">{globalScore}</div>
                                </div>
                            </div>

                            <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm print-container">
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-4">⚙️ Reajuste Psicomotriz</h3>
                                <div className="space-y-4">
                                    {[
                                        { k: 'locomocion', l: 'Locomoción', c: 'text-indigo-600' },
                                        { k: 'estabilidad', l: 'Estabilidad', c: 'text-emerald-600' },
                                        { k: 'manipulacion', l: 'Manipulación', c: 'text-rose-600' }
                                    ].map(s => (
                                        <div key={s.k} className="bg-slate-50 dark:bg-slate-800/40 p-3 rounded-xl flex justify-between items-center">
                                            <span className="text-sm font-bold">{s.l}</span>
                                            <div className="flex items-center gap-4 w-1/2">
                                                <div className="flex-1 bg-slate-200 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                                                    <div className={`h-full bg-current ${s.c}`} style={{ width: `${athlete.skills[s.k]}%` }}></div>
                                                </div>
                                                <span className={`font-black ${s.c} w-10 text-right`}>{athlete.skills[s.k]}%</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm flex flex-col items-center print-container">
                                <span className="text-xs font-bold uppercase text-slate-400 mb-2">Biometría Funcional</span>
                                <SkillsRadar {...athlete.skills} isDarkMode={isDarkMode} />
                            </div>
                            
                            <div className="bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm print-container">
                                <h4 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-3 text-center">🧬 Fisiología y Carga</h4>
                                <div className="grid grid-cols-2 gap-2 text-center text-xs">
                                    <div className="bg-slate-50 dark:bg-slate-800 p-2 rounded-xl">
                                        <div className="text-[10px] text-slate-400 uppercase">IMC Actual</div>
                                        <div className="font-black text-slate-700 dark:text-white text-base">{imc}</div>
                                    </div>
                                    <div className="bg-slate-50 dark:bg-slate-800 p-2 rounded-xl">
                                        <div className="text-[10px] text-slate-400 uppercase">VO2Máx Est.</div>
                                        <div className="font-black text-indigo-600 dark:text-indigo-400 text-base">{vo2max} <span className="text-[9px]">ml/kg</span></div>
                                    </div>
                                    <div className="col-span-2 bg-slate-50 dark:bg-slate-800 p-3 rounded-xl flex justify-between items-center mt-2">
                                        <div className="text-left">
                                            <div className="text-[10px] text-slate-400 uppercase">Tendencia RPE</div>
                                            <div className="font-black">Últimas sesiones</div>
                                        </div>
                                        <Sparkline data={athlete.rpeHistory} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AlphaView = ({ classes, classIdx, setClasses }) => {
            const currentClass = classes[classIdx];

            const handleAlphaChange = (id, metric, val) => {
                setClasses(prev => prev.map((c, cI) => {
                    if (cI !== classIdx) return c;
                    return {
                        ...c,
                        athletes: c.athletes.map(a => a.id === id ? { ...a, alpha: { ...a.alpha, [metric]: parseFloat(val) || 0 } } : a)
                    };
                }));
            };

            return (
                <div className="bg-white dark:bg-slate-900 rounded-3xl border dark:border-slate-800 p-6 shadow-sm overflow-x-auto animate-fade hide-scrollbar">
                    <h3 className="text-base font-black mb-4 flex items-center justify-between">
                        <span>📏 Batería ALPHA-Fitness + Fisiología</span>
                        <span className="text-[10px] bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 px-2 py-1 rounded font-mono">Cálculo Aut. Léger et al.</span>
                    </h3>
                    <table className="w-full text-left text-xs min-w-[800px]">
                        <thead className="bg-slate-50 dark:bg-slate-800 text-slate-400 border-b dark:border-slate-700">
                            <tr>
                                <th className="p-3">Alumno</th><th className="p-3">Masa (kg)</th><th className="p-3">Est. (cm)</th>
                                <th className="p-3 text-indigo-600 dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-900/10 rounded-tl-lg">IMC (Auto)</th>
                                <th className="p-3">Salto (cm)</th><th className="p-3">Fuerza (kg)</th><th className="p-3">Navette (Palier)</th>
                                <th className="p-3 text-emerald-600 dark:text-emerald-400 bg-emerald-50/50 dark:bg-emerald-900/10 rounded-tr-lg">VO2Máx (Auto)</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                            {currentClass.athletes.map(a => {
                                const imc = calcularIMC(a.alpha.peso, a.alpha.altura);
                                const vo2 = calcularVO2Max(a.alpha.navette, currentClass.baseAge);
                                return (
                                    <tr key={a.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/30">
                                        <td className="p-3 font-bold">{a.name}</td>
                                        <td className="p-3"><input type="number" value={a.alpha.peso} onChange={e => handleAlphaChange(a.id, 'peso', e.target.value)} className="w-12 bg-transparent outline-none border-b border-dashed border-slate-300 focus:border-brand-500" /></td>
                                        <td className="p-3"><input type="number" value={a.alpha.altura} onChange={e => handleAlphaChange(a.id, 'altura', e.target.value)} className="w-12 bg-transparent outline-none border-b border-dashed border-slate-300 focus:border-brand-500" /></td>
                                        <td className="p-3 font-black text-indigo-600 dark:text-indigo-400 bg-indigo-50/30 dark:bg-indigo-900/10">{imc}</td>
                                        <td className="p-3"><input type="number" value={a.alpha.salto} onChange={e => handleAlphaChange(a.id, 'salto', e.target.value)} className="w-12 bg-transparent outline-none border-b border-dashed border-slate-300" /></td>
                                        <td className="p-3"><input type="number" value={a.alpha.fuerza} onChange={e => handleAlphaChange(a.id, 'fuerza', e.target.value)} className="w-12 bg-transparent outline-none border-b border-dashed border-slate-300" /></td>
                                        <td className="p-3"><input type="number" step="0.5" value={a.alpha.navette} onChange={e => handleAlphaChange(a.id, 'navette', e.target.value)} className="w-12 bg-transparent outline-none border-b border-dashed border-slate-300" /></td>
                                        <td className="p-3 font-black text-emerald-600 dark:text-emerald-400 bg-emerald-50/30 dark:bg-emerald-900/10">{vo2}</td>
                                    </tr>
                                )
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        const RankingView = ({ classes }) => {
            // Unificamos a todos los alumnos para crear un Ranking Inter-Clases
            const allAthletes = useMemo(() => {
                let all = [];
                classes.forEach(c => {
                    c.athletes.forEach(a => {
                        all.push({ ...a, className: c.name, age: c.baseAge, globalMotor: calcularMotorGlobal(a.skills) });
                    });
                });
                return all;
            }, [classes]);

            const topMotor = [...allAthletes].sort((a, b) => b.globalMotor - a.globalMotor).slice(0, 10);
            const topVo2 = [...allAthletes].sort((a, b) => parseFloat(calcularVO2Max(b.alpha.navette, b.age)) - parseFloat(calcularVO2Max(a.alpha.navette, a.age))).slice(0, 10);

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade">
                    <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm">
                        <h3 className="font-black text-lg mb-4 flex items-center gap-2">🥇 Top 10: Índice Motor Global</h3>
                        <div className="space-y-3">
                            {topMotor.map((a, i) => (
                                <div key={a.id + a.className} className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black ${i<3 ? 'bg-amber-100 text-amber-700' : 'bg-slate-200 text-slate-500'}`}>{i+1}</div>
                                        <div>
                                            <div className="font-bold text-sm">{a.name}</div>
                                            <div className="text-[10px] text-slate-400">{a.className}</div>
                                        </div>
                                    </div>
                                    <div className="font-black text-indigo-600 dark:text-indigo-400 text-lg">{a.globalMotor}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm">
                        <h3 className="font-black text-lg mb-4 flex items-center gap-2">🫀 Top 10: Salud Cardiovascular (VO2Máx)</h3>
                        <div className="space-y-3">
                            {topVo2.map((a, i) => (
                                <div key={a.id + a.className} className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black ${i<3 ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'}`}>{i+1}</div>
                                        <div>
                                            <div className="font-bold text-sm">{a.name}</div>
                                            <div className="text-[10px] text-slate-400">{a.className}</div>
                                        </div>
                                    </div>
                                    <div className="font-black text-emerald-600 dark:text-emerald-400 text-lg">{calcularVO2Max(a.alpha.navette, a.age)}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        function DecaKidsApp() {
            // Inicialización segura de LocalStorage
            const [classes, setClasses] = useState(() => {
                try {
                    const saved = localStorage.getItem('decaKidsData_UltraPro');
                    if (saved) return JSON.parse(saved);
                } catch (e) { console.error("Error cargando LocalStorage", e); }
                return initialDataset;
            });

            // Guardado automático cada vez que 'classes' cambia
            useEffect(() => {
                try {
                    localStorage.setItem('decaKidsData_UltraPro', JSON.stringify(classes));
                } catch (e) { console.error("Error guardando en LocalStorage", e); }
            }, [classes]);

            const [view, setView] = useState('dashboard');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [classIdx, setClassIdx] = useState(0);
            const [athleteId, setAthleteId] = useState(1);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const activeClass = classes[classIdx] || classes[0];
            const activeAthlete = activeClass.athletes.find(a => a.id === athleteId) || activeClass.athletes[0];

            return (
                <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6 min-h-screen pb-20">
                    <header className="bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm flex justify-between items-center no-print">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-black text-xl shadow-md">D</div>
                            <div>
                                <h1 className="text-xl font-black">DecaKids <span className="text-indigo-600">ULTRA PRO MAX</span></h1>
                                <p className="text-[10px] text-emerald-500 font-bold uppercase flex items-center gap-1">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Auto-Guardado Activo
                                </p>
                            </div>
                        </div>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="bg-slate-100 dark:bg-slate-800 p-2 rounded-xl hover:bg-slate-200 transition-colors">{isDarkMode ? '☀️' : '🌙'}</button>
                    </header>

                    <nav className="bg-slate-200/60 dark:bg-slate-900 p-1.5 rounded-2xl flex gap-1 overflow-x-auto hide-scrollbar border dark:border-slate-800 no-print">
                        {[
                            { id: 'dashboard', i: '📊', l: 'Dashboard' }, 
                            { id: 'athlete', i: '👤', l: 'Alumno' }, 
                            { id: 'alpha', i: '📏', l: 'ALPHA + Fisio' }, 
                            { id: 'ranking', i: '🏆', l: 'Ranking' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setView(t.id)} className={`flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${view === t.id ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:bg-white/40'}`}>
                                <span>{t.i}</span>{t.l}
                            </button>
                        ))}
                    </nav>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 no-print">
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-bold uppercase text-slate-400">Grupo de Intervención</label>
                            <select value={classIdx} onChange={e => { const idx = parseInt(e.target.value); setClassIdx(idx); setAthleteId(classes[idx].athletes[0].id); }} className="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 p-3 rounded-xl text-xs font-bold outline-none cursor-pointer">
                                {classes.map((c, i) => <option key={i} value={i}>{c.name}</option>)}
                            </select>
                        </div>
                        {view === 'athlete' && (
                            <div className="flex flex-col gap-1">
                                <label className="text-[10px] font-bold uppercase text-slate-400">Expediente Alumno</label>
                                <select value={athleteId} onChange={e => setAthleteId(parseInt(e.target.value))} className="w-full bg-indigo-50/60 dark:bg-indigo-950/20 border border-indigo-100/50 p-3 rounded-xl text-xs font-bold text-indigo-700 outline-none cursor-pointer">
                                    {activeClass.athletes.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                </select>
                            </div>
                        )}
                    </div>

                    <main>
                        {view === 'dashboard' && <DashboardView classes={classes} classIdx={classIdx} />}
                        {view === 'athlete' && <AthleteView classes={classes} classIdx={classIdx} athleteId={athleteId} setClasses={setClasses} isDarkMode={isDarkMode} />}
                        {view === 'alpha' && <AlphaView classes={classes} classIdx={classIdx} setClasses={setClasses} />}
                        {view === 'ranking' && <RankingView classes={classes} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DecaKidsApp />);
    </script>
</body>
</html>
